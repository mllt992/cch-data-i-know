<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <title>CCH 数据统计平台 - 模型可用性</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Noto+Sans+SC:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  </head>
  <body data-page="availability">
    <div class="decor decor-1"></div>
    <div class="decor decor-2"></div>
    <div class="shell fade-in">
      <aside class="sidebar panel">
        <div class="brand">
          <small>CCH Analytics</small>
          <h1>数据统计平台</h1>
        </div>
        <nav class="menu">
          <a href="/" data-page="overview">首页总览</a>
          <a href="/availability" data-page="availability">模型可用性</a>
          <a href="/channels" data-page="channels">渠道数据分析</a>
          <a href="/tokens" data-page="tokens">Token 使用分析</a>
          <a href="/models" data-page="models">模型使用情况</a>
        </nav>
      </aside>

      <main class="main">
        <section class="topbar panel">
          <div>
            <h2>模型可用性分析</h2>
            <p>成功/失败调用、可用率波动与实时状态热力视图</p>
          </div>
          <div class="btn-row">
            <button id="refreshBtn" class="btn-primary">刷新数据</button>
          </div>
        </section>

        <section class="range-panel panel">
          <div class="range-grid">
            <label class="field">
              <span>开始日期</span>
              <input id="startDate" type="date" />
            </label>
            <label class="field">
              <span>结束日期</span>
              <input id="endDate" type="date" />
            </label>
            <div class="btn-row">
              <button id="applyRangeBtn" class="btn-primary">应用时间段</button>
              <button id="resetRangeBtn" class="btn-ghost">默认近30天</button>
            </div>
          </div>
          <div id="metaText" class="meta">正在加载数据...</div>
        </section>

        <section class="kpi-grid">
          <article class="kpi panel">
            <h3>统计模型数</h3>
            <p id="kpiModelCount">-</p>
          </article>
          <article class="kpi panel">
            <h3>整体可用率</h3>
            <p id="kpiOverall">-</p>
          </article>
          <article class="kpi panel">
            <h3>低于95%模型</h3>
            <p id="kpiUnstable">-</p>
          </article>
          <article class="kpi panel">
            <h3>最稳定模型</h3>
            <p id="kpiTopModel">-</p>
          </article>
        </section>

        <section class="grid-12">
          <article class="chart-card panel col-12">
            <div class="chart-head">
              <h3>实时可用性检测</h3>
              <div class="rt-actions">
                <button class="rt-window-btn active" data-window="today">今天</button>
                <button class="rt-window-btn" data-window="7d">近七天</button>
                <button class="rt-window-btn" data-window="30d">近一个月</button>
                <button class="rt-window-btn" data-window="all">全部</button>
              </div>
            </div>
            <div class="rt-legend">
              <span><i class="rt-dot rt-ok"></i>成功</span>
              <span><i class="rt-dot rt-fail"></i>失败</span>
              <span><i class="rt-dot rt-other"></i>其他</span>
              <span><i class="rt-dot rt-empty"></i>无调用</span>
            </div>
            <div id="realtimeHint" class="meta">正在加载实时可用性...</div>
            <div id="realtimeGrid" class="realtime-grid"></div>
          </article>

          <article class="chart-card panel col-4">
            <div class="chart-head">
              <h3>整体可用率仪表盘</h3>
              <span>成功调用占比</span>
            </div>
            <div id="chartGauge" class="chart chart-sm"></div>
          </article>
          <article class="chart-card panel col-8">
            <div class="chart-head">
              <h3>各模型成功/失败调用</h3>
              <select id="availabilitySort" class="sort-select">
                <option value="desc">调用量: 高到低</option>
                <option value="asc">调用量: 低到高</option>
              </select>
            </div>
            <div id="chartAvailabilityStack" class="chart"></div>
          </article>
          <article class="chart-card panel col-12">
            <div class="chart-head">
              <h3>模型可用率曲线</h3>
              <span>支持滚动查看全部模型</span>
            </div>
            <div id="chartAvailabilityRate" class="chart chart-sm"></div>
          </article>
          <article class="chart-card panel col-12">
            <div class="chart-head">
              <h3>模型可用性明细</h3>
              <span>按调用量排序</span>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>模型</th>
                    <th>总调用</th>
                    <th>成功</th>
                    <th>失败</th>
                    <th>可用率</th>
                    <th>最后调用时间</th>
                  </tr>
                </thead>
                <tbody id="availabilityTbody"></tbody>
              </table>
            </div>
          </article>
        </section>
      </main>
    </div>
    <script src="/static/common.js"></script>
    <script src="/static/page-availability.js"></script>
  </body>
</html>
